version: "3.9"

services:
  faq-robot:
    container_name: faq-robot
    build: .
    env_file: .env
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - OLLAMA_MODEL=qwen2.5:3b-instruct
    ports:
      - "8081:8080"
    volumes:
      # 将宿主机咖啡知识库目录挂载到容器内 /app/coffee
      # 通过 .env 中的 COFFEE_HOST_PATH 注入实际路径（绝对路径）
      - ${COFFEE_HOST_PATH:-./coffee}:/app/coffee
      - faq-data:/app/data
      - faq-logs:/app/logs
    restart: unless-stopped
    command: python main.py --ws

volumes:
  faq-data:
  faq-logs:
