version: "3.9"

services:
  faq-bot:
    container_name: faq-bot
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - /mnt/panshi/zbnian个人库/memory/01_Personal/coffee:/app/coffee
      - faq-data:/app/data
      - faq-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  faq-data:
  faq-logs: