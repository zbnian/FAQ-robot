version: "3.9"

services:
  faq-robot:
    container_name: faq-robot
    build: .
    env_file: .env
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - OLLAMA_MODEL=qwen2.5:3b-instruct
    ports:
      - "8081:8080"
    volumes:
      - /data_s001/data/udata/real/13450391900/output/zbnian个人库/memory/01_Personal/coffee:/app/coffee
      - faq-data:/app/data
      - faq-logs:/app/logs
    restart: unless-stopped
    command: python main.py --ws

volumes:
  faq-data:
  faq-logs:
